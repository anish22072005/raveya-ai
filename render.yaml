# render.yaml — one-click deploy on render.com
services:
  - type: web
    name: raveya-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false          # fill in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MONGODB_URL
        sync: false          # MongoDB Atlas connection string
      - key: MONGODB_DB_NAME
        value: raveya
      - key: APP_ENV
        value: production
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: ESCALATION_PHONE
        sync: false
    healthCheckPath: /health
    autoDeploy: true
